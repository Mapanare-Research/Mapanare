name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_call:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Format check (black)
        run: black --check --target-version py311 .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy mapanare/ runtime/

      - name: Run tests
        run: pytest tests/ -v -n auto --durations=20

  # ---------------------------------------------------------------------------
  # Self-hosted compiler: build mnc-stage1 and validate golden tests
  # ---------------------------------------------------------------------------
  self-hosted:
    name: Self-Hosted Compiler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Mapanare
        run: pip install -e ".[dev]"

      - name: Install LLVM tools
        run: sudo apt-get update -qq && sudo apt-get install -y llvm-18 clang-18

      - name: Build mnc-stage1 (Python bootstrap)
        run: python scripts/build_stage1.py --skip-check
        continue-on-error: true

      - name: Run golden tests (25/25)
        if: success()
        run: python scripts/ir_doctor.py golden

      - name: Run stage2 validation
        if: success()
        run: python scripts/ir_doctor.py stage2 --timeout 30
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Native bootstrap: build from seed binary, no Python
  # ---------------------------------------------------------------------------
  bootstrap:
    name: Bootstrap (No Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM + clang
        run: sudo apt-get update -qq && sudo apt-get install -y llvm-18 clang-18

      - name: Symlink clang
        run: sudo ln -sf /usr/bin/clang-18 /usr/bin/clang

      - name: Two-stage bootstrap + verify
        run: bash scripts/build_from_seed.sh --verify

  native:
    name: C Runtime Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile C runtime (plain)
        run: |
          gcc -O2 -g -Wall -Wextra -Werror -pthread \
            tests/native/test_c_runtime.c \
            runtime/native/mapanare_core.c \
            runtime/native/mapanare_runtime.c \
            -o test_c_runtime
          ./test_c_runtime

      - name: Compile and run with AddressSanitizer
        run: |
          gcc -fsanitize=address -fno-omit-frame-pointer -g -Wall -Wextra -Werror -pthread \
            tests/native/test_c_runtime.c \
            runtime/native/mapanare_core.c \
            runtime/native/mapanare_runtime.c \
            -o test_c_runtime_asan
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 ./test_c_runtime_asan

      - name: Compile and run with ThreadSanitizer
        run: |
          gcc -fsanitize=thread -g -Wall -Wextra -Werror -pthread \
            tests/native/test_c_runtime.c \
            runtime/native/mapanare_core.c \
            runtime/native/mapanare_runtime.c \
            -o test_c_runtime_tsan
          TSAN_OPTIONS=halt_on_error=1 ./test_c_runtime_tsan

  # ---------------------------------------------------------------------------
  # WASM cross-compilation (wasm32-wasi via wasmtime, wasm32 compile-only)
  # ---------------------------------------------------------------------------
  wasm:
    name: WASM Cross-Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Mapanare
        run: pip install -e ".[dev]"

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Install wabt (wat2wasm)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wabt

      - name: Compile examples to WAT (wasm32)
        run: |
          for f in examples/wasm/hello.mn examples/wasm/wasi_app.mn; do
            if [ -f "$f" ]; then
              echo "--- Compiling $f (wasm32) ---"
              python -m mapanare emit-wasm "$f" -o "${f%.mn}.wat"
            fi
          done

      - name: Compile examples to WAT (wasm32-wasi)
        run: |
          for f in examples/wasm/hello.mn examples/wasm/wasi_app.mn; do
            if [ -f "$f" ]; then
              echo "--- Compiling $f (wasm32-wasi) ---"
              python -m mapanare emit-wasm --wasi "$f" -o "${f%.mn}.wasi.wat"
            fi
          done

      - name: Convert WAT to WASM binary
        run: |
          for wat in examples/wasm/*.wat; do
            if [ -f "$wat" ]; then
              echo "--- wat2wasm $wat ---"
              wat2wasm "$wat" -o "${wat%.wat}.wasm"
            fi
          done

      - name: Run WASI examples on wasmtime
        run: |
          echo "SKIP: WASI emitter currently emits browser env:: imports"
          echo "      (not fd_write). wasmtime run deferred until WASI"
          echo "      import support is implemented in emit_wasm.py."

      - name: Run WASM pytest suite
        run: pytest tests/wasm/ -v

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: |
            examples/wasm/*.wat
            examples/wasm/*.wasm
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Android cross-compilation (compile-only, no device)
  # ---------------------------------------------------------------------------
  android:
    name: Android Cross-Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Mapanare
        run: pip install -e ".[dev]"

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK via sdkmanager
        run: |
          sdkmanager --install "ndk;26.1.10909125" 2>/dev/null || true
          # Find the NDK path
          NDK_PATH="$ANDROID_HOME/ndk/26.1.10909125"
          if [ ! -d "$NDK_PATH" ]; then
            NDK_PATH=$(find "$ANDROID_HOME/ndk" -maxdepth 1 -type d | tail -1)
          fi
          echo "NDK_PATH=$NDK_PATH" >> "$GITHUB_ENV"
          echo "Found NDK at: $NDK_PATH"

      - name: Cross-compile C runtime for Android ARM64
        run: |
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          CC="$TOOLCHAIN/bin/aarch64-linux-android34-clang"
          if [ -f "$CC" ]; then
            echo "--- Compiling C runtime for aarch64-linux-android34 ---"
            "$CC" -c -O2 -DMAPANARE_PLATFORM_ANDROID=1 \
              runtime/native/mapanare_core.c \
              -o mapanare_core_android_arm64.o
            "$CC" -c -O2 -DMAPANARE_PLATFORM_ANDROID=1 \
              runtime/native/mapanare_runtime.c \
              -o mapanare_runtime_android_arm64.o
            file mapanare_core_android_arm64.o
            file mapanare_runtime_android_arm64.o
            echo "Android ARM64 cross-compilation successful"
          else
            echo "WARN: NDK clang not found at $CC"
            ls -la "$TOOLCHAIN/bin/" | head -20
          fi

      - name: Cross-compile C runtime for Android x86_64
        run: |
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          CC="$TOOLCHAIN/bin/x86_64-linux-android34-clang"
          if [ -f "$CC" ]; then
            echo "--- Compiling C runtime for x86_64-linux-android34 ---"
            "$CC" -c -O2 -DMAPANARE_PLATFORM_ANDROID=1 \
              runtime/native/mapanare_core.c \
              -o mapanare_core_android_x64.o
            "$CC" -c -O2 -DMAPANARE_PLATFORM_ANDROID=1 \
              runtime/native/mapanare_runtime.c \
              -o mapanare_runtime_android_x64.o
            file mapanare_core_android_x64.o
            file mapanare_runtime_android_x64.o
            echo "Android x86_64 cross-compilation successful"
          else
            echo "WARN: NDK clang not found at $CC"
          fi

      - name: Verify ELF format
        run: |
          for obj in *_android_*.o; do
            if [ -f "$obj" ]; then
              echo "--- Checking $obj ---"
              file "$obj"
              readelf -h "$obj" 2>/dev/null | head -5 || true
            fi
          done

      - name: Run Android target tests
        run: pytest tests/targets/ -v -k "android or mobile"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            *_android_*.o
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # macOS native + iOS cross-compilation (aarch64-apple-macos, aarch64-apple-ios)
  # ---------------------------------------------------------------------------
  macos:
    name: macOS & iOS Cross-Compilation
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Mapanare
        run: pip install -e ".[dev]"

      - name: Compile C runtime for macOS (native arm64)
        run: |
          echo "--- Compiling C runtime for aarch64-apple-macos ---"
          cd runtime/native
          clang -c -std=c11 -O2 -Wall -Wextra -Werror mapanare_core.c -o mapanare_core.o
          clang -c -std=c11 -O2 -Wall -Wextra -Werror mapanare_runtime.c -o mapanare_runtime.o
          clang -c -std=c11 -O2 -Wall -Wextra -Werror mapanare_io.c -o mapanare_io.o
          clang -c -std=c11 -O2 -Wall -Wextra -Werror mapanare_gpu.c -o mapanare_gpu.o
          ar rcs libmapanare.a mapanare_core.o mapanare_runtime.o mapanare_io.o mapanare_gpu.o
          echo "Static library built:"
          ls -la libmapanare.a
          file mapanare_core.o
          echo "macOS native build: OK"

      - name: Run macOS C runtime tests
        run: |
          cd runtime/native
          clang -std=c11 -O2 -Wall -Wextra -Werror -I. \
            ../../tests/native/test_c_runtime.c \
            mapanare_core.c mapanare_runtime.c \
            -lpthread -o test_c_runtime_macos
          ./test_c_runtime_macos

      - name: Run with AddressSanitizer
        run: |
          cd runtime/native
          clang -fsanitize=address -fno-omit-frame-pointer -g -Wall -Wextra -Werror -std=c11 -I. \
            ../../tests/native/test_c_runtime.c \
            mapanare_core.c mapanare_runtime.c \
            -lpthread -o test_c_runtime_asan
          ASAN_OPTIONS=detect_leaks=0 ./test_c_runtime_asan

      - name: Run with ThreadSanitizer
        run: |
          cd runtime/native
          clang -fsanitize=thread -g -Wall -Wextra -Werror -std=c11 -I. \
            ../../tests/native/test_c_runtime.c \
            mapanare_core.c mapanare_runtime.c \
            -lpthread -o test_c_runtime_tsan
          TSAN_OPTIONS=halt_on_error=1 ./test_c_runtime_tsan

      - name: Build universal binary (arm64 + x86_64)
        run: |
          cd runtime/native
          for arch in arm64 x86_64; do
            for src in mapanare_core.c mapanare_runtime.c mapanare_io.c mapanare_gpu.c; do
              clang -c -std=c11 -O2 -arch $arch "$src" -o "${src%.c}_${arch}.o"
            done
            ar rcs "libmapanare_${arch}.a" *_${arch}.o
          done
          lipo -create libmapanare_arm64.a libmapanare_x86_64.a -output libmapanare_universal.a
          echo "Universal binary architectures:"
          lipo -info libmapanare_universal.a
          ls -la libmapanare_universal.a

      - name: Compile Metal GPU backend
        run: |
          cd runtime/native
          clang -c -O2 -Wall -fobjc-arc mapanare_metal.m -o mapanare_metal.o
          file mapanare_metal.o
          echo "Metal backend compiled"

      - name: Cross-compile C runtime for iOS (aarch64-apple-ios)
        run: |
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "iOS SDK: $IOS_SDK"
          cd runtime/native
          for src in mapanare_core.c mapanare_runtime.c mapanare_io.c mapanare_gpu.c; do
            echo "--- Compiling $src for iOS ---"
            xcrun --sdk iphoneos clang -c -std=c11 -O2 -Wall \
              -target arm64-apple-ios17.0 \
              -isysroot "$IOS_SDK" \
              "$src" -o "${src%.c}_ios.o"
          done
          ar rcs libmapanare_ios.a *_ios.o
          echo "iOS static library built:"
          ls -la libmapanare_ios.a

      - name: Verify Mach-O format (iOS)
        run: |
          cd runtime/native
          echo "=== File format ==="
          file mapanare_core_ios.o
          echo "=== Architecture ==="
          lipo -info mapanare_core_ios.o
          echo "=== Key symbols ==="
          nm -g mapanare_runtime_ios.o | grep " T " | head -20
          echo ""
          echo "=== Verify dispatch_semaphore (not deprecated sem_init) ==="
          nm -u mapanare_runtime_ios.o | grep -c dispatch_semaphore && echo "dispatch_semaphore: OK"
          ! nm -u mapanare_runtime_ios.o | grep -q sem_init && echo "sem_init absent: OK"
          echo ""
          echo "=== Verify kqueue event loop (not epoll) ==="
          ! nm -u mapanare_io_ios.o | grep -qi epoll && echo "No epoll references: OK"

      - name: Emit LLVM IR with iOS target
        run: |
          if [ -f tests/golden/01_hello.mn ]; then
            cp tests/golden/01_hello.mn /tmp/hello_ios_test.mn
            mapanare emit-llvm --target aarch64-apple-ios /tmp/hello_ios_test.mn
            grep 'target triple' /tmp/hello_ios_test.ll
            echo "iOS LLVM IR emission: OK"
          fi

      - name: "End-to-end: .mn -> LLVM IR -> iOS Mach-O"
        run: |
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          if [ -f /tmp/hello_ios_test.ll ]; then
            xcrun --sdk iphoneos clang -c \
              -target arm64-apple-ios17.0 \
              -isysroot "$IOS_SDK" \
              /tmp/hello_ios_test.ll -o /tmp/hello_ios.o
            file /tmp/hello_ios.o
            nm -g /tmp/hello_ios.o
            echo "End-to-end iOS compile: OK"
          fi

      - name: Run iOS cross-compilation tests
        run: pytest tests/targets/test_ios_crosscompile.py -v

      - name: Run full test suite on macOS
        run: pytest tests/ -v --ignore=tests/bootstrap/

      - name: Upload macOS/iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-ios-artifacts
          path: |
            runtime/native/libmapanare.a
            runtime/native/libmapanare_ios.a
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Bootstrap from seed — build without Python (gcc + llvm only)
  # ---------------------------------------------------------------------------
  bootstrap-from-seed:
    name: Bootstrap from Seed (No Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM + gcc
        run: sudo apt-get update -qq && sudo apt-get install -y llvm gcc

      - name: Build from seed
        run: bash scripts/build_from_seed.sh

      - name: Validate output (compile hello → llvm-as)
        run: |
          ./mnc tests/golden/01_hello.mn > /tmp/hello.ll
          llvm-as /tmp/hello.ll -o /dev/null
          echo "Bootstrap compiler produces valid IR"

      - name: Run golden subset (smoke test)
        run: |
          PASS=0; FAIL=0
          for mn in tests/golden/01_hello.mn tests/golden/02_arithmetic.mn tests/golden/03_functions.mn; do
            if [ -f "$mn" ]; then
              if ./mnc "$mn" | llvm-as -o /dev/null 2>/dev/null; then
                PASS=$((PASS + 1))
              else
                FAIL=$((FAIL + 1))
                echo "FAIL: $mn"
              fi
            fi
          done
          echo "Golden smoke: ${PASS} pass, ${FAIL} fail"
          [ "${FAIL}" -eq 0 ]

  # Fixed-point verification (manual milestone check, not per-PR).
  # Run locally: bash scripts/verify_fixed_point.sh
  # Blocked until emit_llvm.mn handles all IR constructs.
