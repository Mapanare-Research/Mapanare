name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_call:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Format check (black)
        run: black --check --target-version py311 .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy mapanare/ runtime/

      - name: Run tests
        run: pytest tests/ -v

  native:
    name: C Runtime Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile C runtime (plain)
        run: |
          gcc -O2 -g -pthread \
            tests/native/test_c_runtime.c \
            runtime/native/mapanare_core.c \
            runtime/native/mapanare_runtime.c \
            -o test_c_runtime
          ./test_c_runtime

      - name: Compile and run with AddressSanitizer
        run: |
          gcc -fsanitize=address -fno-omit-frame-pointer -g -pthread \
            tests/native/test_c_runtime.c \
            runtime/native/mapanare_core.c \
            runtime/native/mapanare_runtime.c \
            -o test_c_runtime_asan
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 ./test_c_runtime_asan

      - name: Compile and run with ThreadSanitizer
        run: |
          gcc -fsanitize=thread -g -pthread \
            tests/native/test_c_runtime.c \
            runtime/native/mapanare_core.c \
            runtime/native/mapanare_runtime.c \
            -o test_c_runtime_tsan
          TSAN_OPTIONS=halt_on_error=1 ./test_c_runtime_tsan
